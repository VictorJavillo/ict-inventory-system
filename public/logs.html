<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Logs</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --danger-dark: #b91c1c;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .logs-page {
      min-height: 100vh;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .page-title h1 {
      margin: 0;
      font-size: 2rem;
    }

    .page-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .nav-link {
      text-decoration: none;
      color: var(--primary);
      font-weight: 600;
      font-size: 0.92rem;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .user-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #eef2ff;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #3730a3;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-dark);
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .card-header {
      padding: 20px 20px 10px;
    }

    .card-header h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .card-header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .card-body {
      padding: 20px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .form-control,
    .form-select {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.95rem;
      outline: none;
      background: #fff;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .search-box {
      width: 320px;
      max-width: 100%;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
      background: white;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 0.94rem;
    }

    th {
      background: #f8fafc;
      font-size: 0.9rem;
      color: #374151;
      white-space: nowrap;
    }

    tr:hover td {
      background: #f9fbff;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .badge-login,
    .badge-logout {
      background: rgba(37, 99, 235, 0.12);
      color: #1d4ed8;
    }

    .badge-create {
      background: rgba(5, 150, 105, 0.12);
      color: #047857;
    }

    .badge-update {
      background: rgba(217, 119, 6, 0.12);
      color: #b45309;
    }

    .badge-delete,
    .badge-failed_login {
      background: rgba(220, 38, 38, 0.12);
      color: #b91c1c;
    }

    .badge-default {
      background: rgba(107, 114, 128, 0.12);
      color: #374151;
    }

    .module-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      background: #eef2ff;
      color: #4338ca;
      text-transform: uppercase;
    }

    .message {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.92rem;
      display: none;
    }

    .message.success {
      display: block;
      background: rgba(5, 150, 105, 0.12);
      color: #065f46;
      border: 1px solid rgba(5, 150, 105, 0.25);
    }

    .message.error {
      display: block;
      background: rgba(220, 38, 38, 0.12);
      color: #991b1b;
      border: 1px solid rgba(220, 38, 38, 0.25);
    }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--muted);
    }

    .details-cell {
      min-width: 260px;
      line-height: 1.45;
    }

    .time-cell {
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      .logs-page {
        padding: 14px;
      }

      .page-title h1 {
        font-size: 1.55rem;
      }

      .card-header,
      .card-body {
        padding: 16px;
      }

      .top-actions,
      .toolbar-left,
      .toolbar-right {
        width: 100%;
      }

      .top-actions .btn,
      .toolbar .btn,
      .search-box,
      .form-select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="logs-page">
    <div class="topbar">
      <div class="page-title">
        <h1>Activity Logs</h1>
        <p>Audit trail for logins, users, inventory, and borrow transactions.</p>
        <div class="nav-links">
          <a class="nav-link" href="dashboard.html">Dashboard</a>
          <a class="nav-link" href="inventory.html">Inventory</a>
          <a class="nav-link" href="borrow.html">Borrow</a>
          <a class="nav-link" href="users.html">Users</a>
          <a class="nav-link" href="logs.html">Logs</a>
        </div>
      </div>

      <div class="top-actions">
        <div class="user-chip" id="currentUserChip">Checking session...</div>
        <button class="btn btn-danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div id="messageBox" class="message"></div>

    <div class="card">
      <div class="card-header">
        <h2>System Audit Trail</h2>
        <p>View the latest 500 recorded activities from the system.</p>
      </div>

      <div class="card-body">
        <div class="toolbar">
          <div class="toolbar-left">
            <input
              type="text"
              id="searchInput"
              class="form-control search-box"
              placeholder="Search username, action, module, details..."
            />

            <select id="actionFilter" class="form-select">
              <option value="">All Actions</option>
              <option value="LOGIN">LOGIN</option>
              <option value="LOGOUT">LOGOUT</option>
              <option value="CREATE">CREATE</option>
              <option value="UPDATE">UPDATE</option>
              <option value="DELETE">DELETE</option>
              <option value="FAILED_LOGIN">FAILED_LOGIN</option>
            </select>

            <select id="moduleFilter" class="form-select">
              <option value="">All Modules</option>
              <option value="AUTH">AUTH</option>
              <option value="USERS">USERS</option>
              <option value="INVENTORY">INVENTORY</option>
              <option value="BORROW">BORROW</option>
            </select>
          </div>

          <div class="toolbar-right">
            <button class="btn btn-secondary" id="refreshBtn">Refresh</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Role</th>
                <th>Action</th>
                <th>Module</th>
                <th>Details</th>
                <th>Created At</th>
              </tr>
            </thead>
            <tbody id="logsTableBody">
              <tr>
                <td colspan="7" class="empty-state">Loading logs...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allLogs = [];

    const currentUserChip = document.getElementById("currentUserChip");
    const logoutBtn = document.getElementById("logoutBtn");
    const messageBox = document.getElementById("messageBox");
    const logsTableBody = document.getElementById("logsTableBody");
    const searchInput = document.getElementById("searchInput");
    const actionFilter = document.getElementById("actionFilter");
    const moduleFilter = document.getElementById("moduleFilter");
    const refreshBtn = document.getElementById("refreshBtn");

    function showMessage(text, type = "success") {
      messageBox.className = `message ${type}`;
      messageBox.textContent = text;

      setTimeout(() => {
        messageBox.className = "message";
        messageBox.textContent = "";
      }, 3500);
    }

    function getActionBadge(action) {
      const safe = String(action || "").toUpperCase();

      if (safe === "LOGIN") {
        return `<span class="badge badge-login">LOGIN</span>`;
      }
      if (safe === "LOGOUT") {
        return `<span class="badge badge-logout">LOGOUT</span>`;
      }
      if (safe === "CREATE") {
        return `<span class="badge badge-create">CREATE</span>`;
      }
      if (safe === "UPDATE") {
        return `<span class="badge badge-update">UPDATE</span>`;
      }
      if (safe === "DELETE") {
        return `<span class="badge badge-delete">DELETE</span>`;
      }
      if (safe === "FAILED_LOGIN") {
        return `<span class="badge badge-failed_login">FAILED_LOGIN</span>`;
      }

      return `<span class="badge badge-default">${safe || "UNKNOWN"}</span>`;
    }

    function formatDateTime(value) {
      if (!value) return "";
      const date = new Date(value);

      if (isNaN(date.getTime())) {
        return value;
      }

      return date.toLocaleString("en-PH", {
        year: "numeric",
        month: "short",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    async function checkSession() {
      try {
        const res = await fetch("/api/session");
        const data = await res.json();

        if (!data.loggedIn) {
          window.location.href = "/login.html";
          return;
        }

        const role = data.user.role || "viewer";
        currentUserChip.textContent = `${data.user.username} (${role})`;

        if (role !== "admin") {
          showMessage("Only admin can access activity logs.", "error");
          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 1500);
          return;
        }

        await loadLogs();
      } catch (error) {
        showMessage("Failed to verify session.", "error");
      }
    }

    async function loadLogs() {
      try {
        logsTableBody.innerHTML = `<tr><td colspan="7" class="empty-state">Loading logs...</td></tr>`;

        const res = await fetch("/api/activity-logs");
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Failed to load activity logs.");
        }

        allLogs = data;
        renderLogs(allLogs);
      } catch (error) {
        logsTableBody.innerHTML = `<tr><td colspan="7" class="empty-state">Failed to load logs.</td></tr>`;
        showMessage(error.message, "error");
      }
    }

    function renderLogs(logs) {
      if (!logs.length) {
        logsTableBody.innerHTML = `<tr><td colspan="7" class="empty-state">No activity logs found.</td></tr>`;
        return;
      }

      logsTableBody.innerHTML = logs.map(log => `
        <tr>
          <td>${log.id ?? ""}</td>
          <td>${log.username || ""}</td>
          <td>${log.role || ""}</td>
          <td>${getActionBadge(log.action)}</td>
          <td><span class="module-badge">${log.module || ""}</span></td>
          <td class="details-cell">${log.details || ""}</td>
          <td class="time-cell">${formatDateTime(log.created_at)}</td>
        </tr>
      `).join("");
    }

    function applyFilters() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const actionValue = actionFilter.value.trim().toUpperCase();
      const moduleValue = moduleFilter.value.trim().toUpperCase();

      const filtered = allLogs.filter(log => {
        const matchesSearch =
          String(log.username || "").toLowerCase().includes(searchTerm) ||
          String(log.role || "").toLowerCase().includes(searchTerm) ||
          String(log.action || "").toLowerCase().includes(searchTerm) ||
          String(log.module || "").toLowerCase().includes(searchTerm) ||
          String(log.details || "").toLowerCase().includes(searchTerm) ||
          String(log.id || "").toLowerCase().includes(searchTerm);

        const matchesAction = !actionValue || String(log.action || "").toUpperCase() === actionValue;
        const matchesModule = !moduleValue || String(log.module || "").toUpperCase() === moduleValue;

        return matchesSearch && matchesAction && matchesModule;
      });

      renderLogs(filtered);
    }

    searchInput.addEventListener("input", applyFilters);
    actionFilter.addEventListener("change", applyFilters);
    moduleFilter.addEventListener("change", applyFilters);
    refreshBtn.addEventListener("click", loadLogs);

    logoutBtn.addEventListener("click", async () => {
      try {
        await fetch("/api/logout", { method: "POST" });
        window.location.href = "/login.html";
      } catch (error) {
        showMessage("Logout failed.", "error");
      }
    });

    checkSession();
  </script>
</body>
</html>
