<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICT Inventory Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="card login-card">
      <div class="center mb-20">
        <div class="brand">ICT <span>Inventory</span></div>
        <div class="subbrand">Local Advanced Inventory System</div>
      </div>

      <form id="loginForm">
        <div class="mb-16">
          <label for="username">Username</label>
          <input type="text" id="username" class="input" placeholder="Enter username" autocomplete="username" required />
        </div>

        <div class="mb-16">
          <label for="password">Password</label>
          <input type="password" id="password" class="input" placeholder="Enter password" autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;" id="loginBtn">Login</button>
      </form>

      <p id="loginMsg" class="small center mt-16"></p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const loginMsg = document.getElementById("loginMsg");
    const loginBtn = document.getElementById("loginBtn");

    async function quickSessionCheck() {
      try {
        const res = await fetch("/api/session", { method: "GET", credentials: "include" });
        const data = await res.json();
        if (data.loggedIn) window.location.href = "/dashboard.html";
      } catch (err) {
        console.error("Session check failed:", err);
      }
    }

    quickSessionCheck();

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      loginMsg.textContent = "";
      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");
        window.location.href = "/dashboard.html";
      } catch (err) {
        loginMsg.textContent = err.message || "Server error. Please try again.";
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
